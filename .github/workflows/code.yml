name: Code

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-code-${{ fromJSON(github.event.inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout .fullsend repository
        uses: actions/checkout@v6
        with:
          path: .fullsend
          fetch-depth: 1

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.source_repo }}
          path: target-repo
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        env:
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
        run: bash .fullsend/scripts/pre-code.sh

      - name: Extract target repo owner and name
        id: repo-parts
        run: |
          OWNER="${SOURCE_REPO%%/*}"
          REPO_NAME="${SOURCE_REPO##*/}"
          echo "owner=${OWNER}" >> "${GITHUB_OUTPUT}"
          echo "name=${REPO_NAME}" >> "${GITHUB_OUTPUT}"
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}

      - name: Generate GitHub App token
        if: vars.FULLSEND_CODER_CLIENT_ID != ''
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_CODER_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_CODER_APP_PRIVATE_KEY }}
          owner: ${{ steps.repo-parts.outputs.owner }}
          repositories: ${{ steps.repo-parts.outputs.name }}

      - name: Resolve push token
        id: push-token
        run: |
          if [ -n "${APP_TOKEN}" ]; then
            echo "source=github-app" >> "${GITHUB_OUTPUT}"
            echo "token=${APP_TOKEN}" >> "${GITHUB_OUTPUT}"
            echo "::add-mask::${APP_TOKEN}"
            echo "Using GitHub App installation token (PRs will be authored by the App)"
          elif [ -n "${PAT_TOKEN}" ]; then
            echo "source=pat" >> "${GITHUB_OUTPUT}"
            echo "token=${PAT_TOKEN}" >> "${GITHUB_OUTPUT}"
            echo "::add-mask::${PAT_TOKEN}"
            echo "::warning::Using PAT as PUSH_TOKEN — PRs will be authored by the PAT owner, not a bot. Configure FULLSEND_CODER_CLIENT_ID + FULLSEND_CODER_APP_PRIVATE_KEY for bot-authored PRs."
          else
            echo "source=none" >> "${GITHUB_OUTPUT}"
            echo "token=" >> "${GITHUB_OUTPUT}"
            echo "::warning::No push token available — skipping push/PR (Phase 1 mode)"
          fi
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ secrets.PUSH_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: CODE_
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CODE_CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
          CODE_ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
        run: bash .fullsend/.github/scripts/setup-agent-env.sh

      - name: Run code agent(s)
        uses: ./.fullsend/.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          GH_TOKEN: ${{ github.token }}
          PUSH_TOKEN: ${{ steps.push-token.outputs.token }}
          PUSH_TOKEN_SOURCE: ${{ steps.push-token.outputs.source }}
        with:
          agent: code

