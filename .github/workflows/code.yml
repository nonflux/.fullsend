name: Code

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: fullsend-code-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  code:
    name: Code
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ready-to-code') ||
      (github.event_name == 'issue_comment' && (
        startsWith(github.event.comment.body || '', '/code ') ||
        (github.event.comment.body || '') == '/code'
      ))
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          path: target-repo
          fetch-depth: 1

      - name: Checkout .fullsend repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.action_repository }}
          path: .fullsend
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: CODE_
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CODE_CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run code agent(s)
        uses: ./.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ github.event.issue.html_url }}
        with:
          agent: code
