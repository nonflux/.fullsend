name: Code

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-code-${{ fromJSON(github.event.inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout .fullsend repository
        uses: actions/checkout@v6
        with:
          path: .fullsend
          fetch-depth: 1

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.source_repo }}
          path: target-repo
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: CODE_
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CODE_CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
          CODE_ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
        run: bash .fullsend/.github/scripts/setup-agent-env.sh

      - name: Run code agent(s)
        uses: ./.fullsend/.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          GH_TOKEN: ${{ github.token }}
        with:
          agent: code
