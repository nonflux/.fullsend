name: Triage

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

concurrency:
  group: fullsend-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && (
        startsWith(github.event.comment.body || '', '/triage ') ||
        (github.event.comment.body || '') == '/triage'
      ))
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          path: target-repo
          fetch-depth: 1

      - name: Checkout .fullsend repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.action_repository }}
          path: .fullsend
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: TRIAGE_
          TRIAGE_TARGET_REPO_DIR: target-repo
          TRIAGE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          TRIAGE_CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run triage agent(s)
        uses: ./.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ github.event.issue.html_url }}
        with:
          agent: triage
