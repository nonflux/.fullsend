name: Review

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [synchronize]

concurrency:
  # TODO: Verify grouping when event is pull_request vs issues (same PR linked to one issue).
  # pull_request payloads expose pull_request.number; issue events expose issue.number.
  group: fullsend-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ready-for-review') ||
      (github.event_name == 'issue_comment' && (
        startsWith(github.event.comment.body || '', '/review ') ||
        (github.event.comment.body || '') == '/review'
      )) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          path: target-repo
          fetch-depth: 1

      - name: Checkout .fullsend repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.action_repository }}
          path: .fullsend
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: REVIEW_
          REVIEW_TARGET_REPO_DIR: target-repo
          REVIEW_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          REVIEW_CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run review agent(s)
        uses: ./.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ github.event.issue.html_url }}
          GITHUB_PR_URL: ${{ github.event.pull_request.html_url }}
        with:
          agent: review
